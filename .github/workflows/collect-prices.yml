name: Collect Daily Stock Prices

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional ticker or comma-separated tickers for a small manual run"
        required: false
        type: string
      limit:
        description: "Optional max number of SEC tickers to process"
        required: false
        type: string
      start_date:
        description: "Optional YYYY-MM-DD initial start date; empty uses provider max history"
        required: false
        type: string
      request_delay:
        description: "Optional delay between outbound HTTP requests, for example 2s or 500ms"
        required: false
        type: string
      force_backfill:
        description: "Force full-history merge for selected/all tickers"
        required: false
        type: boolean
        default: false
      repair_meta:
        description: "Repair local meta files from JSONL without fetching price history"
        required: false
        type: boolean
        default: false
      force_validate_adjusted:
        description: "Force full adjusted price validation and rewrite"
        required: false
        type: boolean
        default: false
      full_validation_days:
        description: "Days between full adjusted price validations"
        required: false
        type: string
      disable_price_discontinuity_check:
        description: "Disable split-like raw price discontinuity detection"
        required: false
        type: boolean
        default: false
  schedule:
    # 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: STOCK_PRICE
    env:
      STOCK_PRICE_START_DATE: ${{ vars.STOCK_PRICE_START_DATE }}
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      PRICE_REQUEST_DELAY: ${{ vars.PRICE_REQUEST_DELAY }}
      INPUT_TICKER: ${{ inputs.ticker }}
      INPUT_LIMIT: ${{ inputs.limit }}
      INPUT_START_DATE: ${{ inputs.start_date }}
      INPUT_REQUEST_DELAY: ${{ inputs.request_delay }}
      INPUT_FORCE_BACKFILL: ${{ inputs.force_backfill }}
      INPUT_REPAIR_META: ${{ inputs.repair_meta }}
      INPUT_FORCE_VALIDATE_ADJUSTED: ${{ inputs.force_validate_adjusted }}
      INPUT_FULL_VALIDATION_DAYS: ${{ inputs.full_validation_days }}
      INPUT_DISABLE_PRICE_DISCONTINUITY_CHECK: ${{ inputs.disable_price_discontinuity_check }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Collect prices
        run: |
          set -euo pipefail
          USER_AGENT="${SEC_USER_AGENT:-github-stock-collector ${GITHUB_REPOSITORY}}"
          START_DATE="${INPUT_START_DATE:-${STOCK_PRICE_START_DATE:-}}"
          REQUEST_DELAY="${INPUT_REQUEST_DELAY:-${PRICE_REQUEST_DELAY:-2s}}"
          ARGS=(--user-agent "${USER_AGENT}" --data-dir data/prices --request-delay "${REQUEST_DELAY}")

          if [ -n "${START_DATE}" ]; then
            ARGS+=(--start-date "${START_DATE}")
          fi
          if [ -n "${INPUT_TICKER}" ]; then
            ARGS+=(--ticker "${INPUT_TICKER}")
          fi
          if [ -n "${INPUT_LIMIT}" ]; then
            ARGS+=(--limit "${INPUT_LIMIT}")
          fi
          if [ "${INPUT_FORCE_BACKFILL}" = "true" ]; then
            ARGS+=(--force-backfill)
          fi
          if [ "${INPUT_REPAIR_META}" = "true" ]; then
            ARGS+=(--repair-meta)
          fi
          if [ "${INPUT_FORCE_VALIDATE_ADJUSTED}" = "true" ]; then
            ARGS+=(--force-validate-adjusted)
          fi
          if [ -n "${INPUT_FULL_VALIDATION_DAYS}" ]; then
            ARGS+=(--full-validation-days "${INPUT_FULL_VALIDATION_DAYS}")
          fi
          if [ "${INPUT_DISABLE_PRICE_DISCONTINUITY_CHECK}" = "true" ]; then
            ARGS+=(--disable-price-discontinuity-check)
          fi

          go run ./scripts/collect-prices "${ARGS[@]}"

      - name: Commit data updates
        run: |
          if [ -z "$(git status --porcelain data/prices data/actions)" ]; then
            echo "No price or action updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices data/actions
          git commit -m "chore(data): update daily stock prices"
          git push
