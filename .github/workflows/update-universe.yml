name: Update Collectable Ticker Universe

on:
  workflow_dispatch:
    inputs:
      min_market_cap:
        description: "Minimum Yahoo market cap"
        required: false
        type: string
        default: "300000000"
      max_tickers:
        description: "Optional max number of SEC tickers to evaluate"
        required: false
        type: string
        default: "0"
      workers:
        description: "Market cap worker count"
        required: false
        type: string
        default: "4"
      sleep_ms:
        description: "Delay between outbound HTTP requests in milliseconds"
        required: false
        type: string
        default: "2000"
      shard_count:
        description: "Number of shards"
        required: false
        type: string
        default: "1"
      shard_index:
        description: "Shard index to run manually"
        required: false
        type: string
        default: "0"
      batch_size:
        description: "Maximum tickers to process in this run"
        required: false
        type: string
        default: "1000"
      max_runtime_minutes:
        description: "Maximum script runtime in minutes"
        required: false
        type: string
        default: "330"
      graceful_stop_minutes:
        description: "Stop starting new tickers when this many minutes remain"
        required: false
        type: string
        default: "10"
  schedule:
    # Sunday UTC 21:00, 23:00 = Monday KST 06:00, 08:00
    - cron: "0 21,23 * * 0"
    # Monday UTC 01:00..15:00 every 2 hours = Monday KST 10:00..24:00
    - cron: "0 1-15/2 * * 1"

permissions:
  contents: write

concurrency:
  group: update-universe
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    environment: STOCK_PRICE
    env:
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      INPUT_MIN_MARKET_CAP: ${{ inputs.min_market_cap }}
      INPUT_MAX_TICKERS: ${{ inputs.max_tickers }}
      INPUT_WORKERS: ${{ inputs.workers }}
      INPUT_SLEEP_MS: ${{ inputs.sleep_ms }}
      INPUT_SHARD_COUNT: ${{ inputs.shard_count }}
      INPUT_SHARD_INDEX: ${{ inputs.shard_index }}
      INPUT_BATCH_SIZE: ${{ inputs.batch_size }}
      INPUT_MAX_RUNTIME_MINUTES: ${{ inputs.max_runtime_minutes }}
      INPUT_GRACEFUL_STOP_MINUTES: ${{ inputs.graceful_stop_minutes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Update universe
        run: |
          set -euo pipefail
          USER_AGENT="${SEC_USER_AGENT:-github-stock-collector ${GITHUB_REPOSITORY}}"
          MIN_MARKET_CAP="${INPUT_MIN_MARKET_CAP:-300000000}"
          WORKERS="${INPUT_WORKERS:-4}"
          SLEEP_MS="${INPUT_SLEEP_MS:-2000}"
          SHARD_COUNT="${INPUT_SHARD_COUNT:-1}"
          SHARD_INDEX="${INPUT_SHARD_INDEX:-0}"
          BATCH_SIZE="${INPUT_BATCH_SIZE:-1000}"
          MAX_RUNTIME_MINUTES="${INPUT_MAX_RUNTIME_MINUTES:-330}"
          GRACEFUL_STOP_MINUTES="${INPUT_GRACEFUL_STOP_MINUTES:-10}"
          ARGS=(--sec-user-agent "${USER_AGENT}" --output-dir data/universe --min-market-cap "${MIN_MARKET_CAP}" --workers "${WORKERS}" --sleep-ms "${SLEEP_MS}" --shard-count "${SHARD_COUNT}" --shard-index "${SHARD_INDEX}" --batch-size "${BATCH_SIZE}" --max-runtime-minutes "${MAX_RUNTIME_MINUTES}" --graceful-stop-minutes "${GRACEFUL_STOP_MINUTES}")

          if [ -n "${INPUT_MAX_TICKERS}" ] && [ "${INPUT_MAX_TICKERS}" != "0" ]; then
            ARGS+=(--max-tickers "${INPUT_MAX_TICKERS}")
          fi

          go run ./scripts/update-universe "${ARGS[@]}"

      - name: Commit universe updates
        run: |
          COMMIT_PATHS=()
          [ -e data/universe ] && COMMIT_PATHS+=(data/universe)
          [ -e data/state ] && COMMIT_PATHS+=(data/state)

          if [ "${#COMMIT_PATHS[@]}" -eq 0 ]; then
            echo "No universe or state paths exist to commit."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- "${COMMIT_PATHS[@]}")" ]; then
            echo "No universe updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${COMMIT_PATHS[@]}"
          git commit -m "chore(data): update collectable ticker universe"
          git push
