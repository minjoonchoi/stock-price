name: Collect Nasdaq Splits

on:
  schedule:
    - cron: "10 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-nasdaq-splits
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Collect Nasdaq splits
        run: |
          go run ./scripts/collect-nasdaq-splits \
            --output-dir data/nasdaq/splits \
            --github-run-id "${{ github.run_id }}"

      - name: Show data diff
        run: git status --short data/nasdaq/splits

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain data/nasdaq/splits)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasdaq/splits
          git commit -m "chore(data): update nasdaq split calendar"
          git push
