name: Collect Daily Stock Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * *"

permissions:
  contents: write

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      STOCK_PRICE_START_DATE: ${{ vars.STOCK_PRICE_START_DATE }}
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Collect prices
        run: |
          START_DATE="${STOCK_PRICE_START_DATE:-1970-01-01}"
          USER_AGENT="${SEC_USER_AGENT:-github-stock-collector ${GITHUB_REPOSITORY}}"
          go run ./scripts/collect-prices \
            --start-date "${START_DATE}" \
            --user-agent "${USER_AGENT}" \
            --data-dir data/prices

      - name: Commit data updates
        run: |
          if [ -z "$(git status --porcelain data/prices)" ]; then
            echo "No price updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices
          git commit -m "chore(data): update daily stock prices"
          git push
